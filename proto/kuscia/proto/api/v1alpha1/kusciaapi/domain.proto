// ============================================================================
// Protocol Buffers 版本声明
// ============================================================================
// syntax = "proto3" 指定使用 Protocol Buffers 第3版语法
// proto3 是推荐版本，相比 proto2 有以下改进：
// 1. 移除了 required 和 optional 关键字（所有字段都是 optional）
// 2. 移除了 default 关键字
// 3. 枚举的第一个值必须为 0
// 4. 移除了 has_field() 方法
// 5. 支持 map 类型
// 6. 更简洁的语法
syntax = "proto3";

// ============================================================================
// 包名声明
// ============================================================================
// package 用于避免命名冲突，类似于 Java 的 package 或 C++ 的 namespace
// 生成的代码会使用这个包名作为命名空间
// 格式：项目.模块.版本.子模块
package kuscia.proto.api.v1alpha1.kusciaapi;

// ============================================================================
// 导入其他 Proto 文件
// ============================================================================
// import 语句用于引用其他 .proto 文件中定义的消息和服务
// 这里导入了 common.proto，其中定义了 RequestHeader、Status 等通用消息
import "kuscia/proto/api/v1alpha1/common.proto";

// ============================================================================
// 语言特定选项
// ============================================================================
// option 用于设置编译器的行为或生成代码的特性

// go_package: 指定生成的 Go 代码的包路径
// 当使用 protoc 生成 Go 代码时，会使用这个包路径
option go_package = "github.com/secretflow/kuscia/proto/api/v1alpha1/kusciaapi";

// java_package: 指定生成的 Java 代码的包名
// 如果不指定，将使用 package 声明的值
// 这里指定了 Java 包名为 org.secretflow.v1alpha1.kusciaapi
option java_package = "org.secretflow.v1alpha1.kusciaapi";

// ============================================================================
// 服务定义：DomainService（域管理服务）
// ============================================================================
// service 关键字定义一个 gRPC 服务
// 服务包含一组 RPC（Remote Procedure Call）方法
// 每个方法定义请求消息类型和响应消息类型
// 
// 业务背景：
// "域（Domain）"在 Kuscia/Kuscia 框架中代表隐私计算的一个参与方
// 例如：Alice、Bob、TEE 节点等都是不同的域
// 每个域有唯一的 ID、角色、证书等信息
// DomainService 提供域的增删改查功能
service DomainService {
  // --------------------------------------------------------------------------
  // RPC 方法 1: CreateDomain - 创建域
  // --------------------------------------------------------------------------
  // rpc 关键字定义一个远程过程调用方法
  // 格式：rpc 方法名(请求消息类型) returns (响应消息类型)
  // 
  // 功能：在 Kuscia 系统中注册一个新的参与方（域）
  // 使用场景：
  // - 新节点加入隐私计算网络时
  // - 初始化部署时配置参与方
  // 
  // 调用示例（Java）：
  // CreateDomainRequest request = CreateDomainRequest.newBuilder()
  //     .setDomainId("alice")
  //     .setRole("partner")
  //     .setCert(certPemContent)
  //     .build();
  // CreateDomainResponse response = stub.createDomain(request);
  rpc CreateDomain(CreateDomainRequest) returns (CreateDomainResponse);

  // --------------------------------------------------------------------------
  // RPC 方法 2: QueryDomain - 查询域
  // --------------------------------------------------------------------------
  // 功能：根据 domain_id 查询单个域的详细信息
  // 返回信息包括：角色、证书、节点状态、部署令牌状态等
  // 
  // 调用示例：
  // QueryDomainRequest request = QueryDomainRequest.newBuilder()
  //     .setDomainId("alice")
  //     .build();
  // QueryDomainResponse response = stub.queryDomain(request);
  rpc QueryDomain(QueryDomainRequest) returns (QueryDomainResponse);

  // --------------------------------------------------------------------------
  // RPC 方法 3: UpdateDomain - 更新域
  // --------------------------------------------------------------------------
  // 功能：更新已有域的配置信息
  // 可更新的字段：role（角色）、cert（证书）、auth_center（认证中心）、master_domain_id
  // 
  // 使用场景：
  // - 证书轮换（Certificate Rotation）
  // - 修改域的角色
  // - 更新认证配置
  rpc UpdateDomain(UpdateDomainRequest) returns (UpdateDomainResponse);

  // --------------------------------------------------------------------------
  // RPC 方法 4: DeleteDomain - 删除域
  // --------------------------------------------------------------------------
  // 功能：从系统中移除指定的域
  // 
  // 注意事项：
  // - 删除前需确保该域没有运行中的任务
  // - 删除操作不可逆
  // - 可能需要管理员权限
  rpc DeleteDomain(DeleteDomainRequest) returns (DeleteDomainResponse);

  // --------------------------------------------------------------------------
  // RPC 方法 5: BatchQueryDomain - 批量查询域
  // --------------------------------------------------------------------------
  // 功能：一次性查询多个域的信息
  // 
  // 优势：
  // - 减少网络往返次数（相比多次调用 QueryDomain）
  // - 提高查询效率
  // - 适合前端列表展示等场景
  // 
  // 调用示例：
  // BatchQueryDomainRequest request = BatchQueryDomainRequest.newBuilder()
  //     .addDomainIds("alice")
  //     .addDomainIds("bob")
  //     .addDomainIds("tee")
  //     .build();
  // BatchQueryDomainResponse response = stub.batchQueryDomain(request);
  rpc BatchQueryDomain(BatchQueryDomainRequest) returns (BatchQueryDomainResponse);
}

// ============================================================================
// 消息定义：CreateDomainRequest（创建域请求）
// ============================================================================
// message 关键字定义一个消息类型（类似于 Java 的 class 或 struct）
// 消息由多个字段组成，每个字段有类型、名称和唯一编号
//
// 字段编号规则：
// - 编号范围：1 到 536,870,911（2^29 - 1）
// - 1-15：占用 1 字节编码，适合高频字段
// - 16-2047：占用 2 字节编码，适合低频字段
// - 19000-19999：保留给 Protobuf 实现，不能使用
// - 编号一旦分配，不应更改（保证向后兼容）
// - 删除的字段应标记为 reserved，避免重用编号
message CreateDomainRequest {
  // ========================================================================
  // 字段 1: header - 请求头（RequestHeader）
  // ========================================================================
  // 
  // 【什么是 RequestHeader？】
  // RequestHeader 是 Kuscia API 中定义的通用消息类型，用于携带自定义元数据。
  // 它定义在 common.proto 文件中（kuscia/proto/api/v1alpha1/common.proto）。
  // 
  // 【定义结构】
  // message RequestHeader {
  //   map<string, string> custom_headers = 1;  // 自定义键值对
  // }
  // 
  // 【作用说明】
  // RequestHeader 类似于 HTTP 协议中的 Header，但它是 gRPC/Protobuf 层面的元数据容器。
  // 主要用途包括：
  // 1. 追踪 ID（Trace ID）：用于分布式链路追踪
  // 2. 租户信息（Tenant ID）：标识请求所属的租户
  // 3. 审计日志（Audit Info）：记录操作用户、时间等信息
  // 4. 自定义标签（Custom Tags）：传递业务相关的元数据
  // 5. 版本控制（API Version）：指定 API 版本
  // 6. 语言偏好（Language）：国际化支持
  // 
  // 【使用示例】
  // Java 代码示例：
  // <pre>{@code
  // // 创建 RequestHeader
  // RequestHeader header = RequestHeader.newBuilder()
  //     .putCustomHeaders("X-Trace-ID", "trace-12345")        // 追踪 ID
  //     .putCustomHeaders("X-Tenant-ID", "tenant-001")        // 租户 ID
  //     .putCustomHeaders("X-User-ID", "admin")               // 操作用户
  //     .putCustomHeaders("X-Request-Time", "2024-01-15T10:30:00Z")  // 请求时间
  //     .putCustomHeaders("X-API-Version", "v1alpha1")        // API 版本
  //     .build();
  // 
  // // 在请求中使用
  // CreateDomainRequest request = CreateDomainRequest.newBuilder()
  //     .setHeader(header)                                    // 设置请求头
  //     .setDomainId("alice")
  //     .setRole("partner")
  //     .build();
  // 
  // // 服务端可以提取这些信息
  // String traceId = request.getHeader().getCustomHeadersMap()
  //     .getOrDefault("X-Trace-ID", "unknown");
  // }</pre>
  // 
  // 【可选字段】
  // 在 proto3 中，所有字段都是 optional（可选的）。
  // 如果不设置 header 字段，默认值为 null（Java 中）或空对象（Protobuf 中）。
  // 
  // 【与 HTTP Header 的区别】
  // - HTTP Header：传输层元数据，通过 HTTP/2 协议传输
  // - RequestHeader：应用层元数据，嵌入在 Protobuf 消息中
  // - 两者可以共存，互不影响
  // 
  // 【最佳实践】
  // 1. 统一命名规范：使用 "X-" 前缀表示自定义字段（如 X-Trace-ID）
  // 2. 避免敏感信息：不要在 header 中传递密码、密钥等敏感数据
  // 3. 保持简洁：只传递必要的元数据，避免过大
  // 4. 文档化：在团队内统一 header 字段的含义和格式
  // 5. 向后兼容：新增 header 字段时确保旧版本能正常工作
  // 
  // 【服务端处理】
  // Kuscia API 服务端可能会使用这些信息进行：
  // - 日志记录：记录追踪 ID，方便问题排查
  // - 权限验证：根据租户 ID 进行多租户隔离
  // - 审计追踪：记录谁在什么时候做了什么操作
  // - 性能监控：统计不同版本的 API 调用情况
  // - 限流控制：根据用户 ID 进行速率限制
  // 
  // 【注意事项】
  // 1. 大小限制：建议 custom_headers 总大小不超过 8KB
  // 2. 字符编码：所有字符串必须是有效的 UTF-8 编码
  // 3. 键名规范：建议使用大写字母和连字符（如 X-USER-ID）
  // 4. 值格式：时间使用 ISO 8601 格式，ID 使用 UUID 或特定格式
  // 5. 安全性：header 会被记录到日志中，避免包含敏感信息
  //
  // 类型：RequestHeader（从 common.proto 导入）
  // 作用：携带自定义元数据，如追踪 ID、租户信息、审计日志等
  // 可选字段：proto3 中所有字段都是 optional，可以不设置
  // 默认值：如果未设置，使用类型的默认值（message 类型为 null）
  RequestHeader header = 1;
  
  // --------------------------------------------------------------------------
  // 字段 2: domain_id - 域唯一标识
  // --------------------------------------------------------------------------
  // 类型：string（UTF-8 编码的字符串）
  // 作用：域的唯一标识符，在整个系统中必须唯一
  // 命名规范：建议使用小写字母、数字和连字符（如 "alice"、"node-001"）
  // 约束：不能为空，长度建议不超过 64 字符
  // 示例："alice"、"bob"、"tee-node"、"kuscia-master"
  string domain_id = 2;
  
  // --------------------------------------------------------------------------
  // 字段 3: role - 域角色
  // --------------------------------------------------------------------------
  // 类型：string
  // 作用：标识域在隐私计算网络中的角色
  // 可选值：
  //   - "partner"：参与方（普通节点，如 Alice、Bob）
  //   - "master"：主节点（协调者，如 Kuscia Master）
  //   - "client"：客户端角色（某些场景下使用）
  //   - "server"：服务端角色（某些场景下使用）
  // 说明：不同角色有不同的权限和行为
  string role = 3;
  
  // --------------------------------------------------------------------------
  // 字段 4: cert - 域证书
  // --------------------------------------------------------------------------
  // 类型：string
  // 作用：域的 TLS/SSL 证书（PEM 格式）
  // 用途：
  //   - mTLS 双向认证时验证域身份
  //   - 加密域间通信
  // 格式示例：
  //   -----BEGIN CERTIFICATE-----
  //   MIID...（Base64 编码的证书内容）
  //   -----END CERTIFICATE-----
  // 注意：如果 protocol 为 NoTLS，此字段可以为空
  string cert = 4;
  
  // --------------------------------------------------------------------------
  // 字段 5: auth_center - 认证中心配置
  // --------------------------------------------------------------------------
  // 类型：AuthCenter（在本文件底部定义）
  // 作用：配置域的认证方式和令牌生成方法
  // 可选字段：如果不设置，使用系统默认认证配置
  AuthCenter auth_center = 5;
  
  // --------------------------------------------------------------------------
  // 字段 6: master_domain_id - 主域 ID
  // --------------------------------------------------------------------------
  // 类型：string
  // 作用：指定该域所属的主域（Master Domain）
  // 使用场景：
  //   - 中心化部署模式下，partner 需要指定 master
  //   - P2P 模式下，此字段可以为空
  // 示例：如果当前域是 "alice"（partner），master_domain_id 可能是 "kuscia-master"
  string master_domain_id = 6;
}

// ============================================================================
// 消息定义：CreateDomainResponse（创建域响应）
// ============================================================================
// 响应消息通常比较简单，主要包含操作状态
message CreateDomainResponse {
  // --------------------------------------------------------------------------
  // 字段 1: status - 操作状态
  // --------------------------------------------------------------------------
  // 类型：Status（从 common.proto 导入）
  // 作用：表示操作是否成功，以及错误信息（如有）
  // 结构：
  //   - code: int32，状态码（0 表示成功，非 0 表示失败）
  //   - message: string，错误描述信息
  //   - details: repeated google.protobuf.Any，详细错误信息
  // 
  // 成功示例：
  //   status {
  //     code: 0
  //     message: "success"
  //   }
  // 
  // 失败示例：
  //   status {
  //     code: 400
  //     message: "domain_id already exists"
  //   }
  Status status = 1;
}

// ============================================================================
// 消息定义：DeleteDomainRequest（删除域请求）
// ============================================================================
message DeleteDomainRequest {
  // 请求头（携带元数据）
  RequestHeader header = 1;
  
  // 要删除的域 ID
  // 注意：删除前需确保该域没有运行中的任务
  string domain_id = 2;
}

// ============================================================================
// 消息定义：DeleteDomainResponse（删除域响应）
// ============================================================================
message DeleteDomainResponse {
  // 操作状态（code=0 表示删除成功）
  Status status = 1;
}

// ============================================================================
// 消息定义：QueryDomainRequest（查询域请求）
// ============================================================================
message QueryDomainRequest {
  // 请求头（携带元数据）
  RequestHeader header = 1;
  
  // 要查询的域 ID
  // 必须提供有效的 domain_id，否则返回错误
  string domain_id = 2;
}

// ============================================================================
// 消息定义：QueryDomainResponse（查询域响应）
// ============================================================================
message QueryDomainResponse {
  // 操作状态（code=0 表示查询成功）
  Status status = 1;
  
  // 查询结果数据（仅在 status.code=0 时有效）
  // 如果域不存在，data 可能为 null 或返回错误状态
  QueryDomainResponseData data = 2;
}

// ============================================================================
// 消息定义：QueryDomainResponseData（查询域响应数据）
// ============================================================================
// 包含域的完整详细信息
message QueryDomainResponseData {
  // --------------------------------------------------------------------------
  // 字段 1: domain_id - 域 ID
  // --------------------------------------------------------------------------
  string domain_id = 1;
  
  // --------------------------------------------------------------------------
  // 字段 2: role - 域角色
  // --------------------------------------------------------------------------
  // 可选值："partner"、"master"、"client"、"server"
  string role = 2;
  
  // --------------------------------------------------------------------------
  // 字段 3: cert - 域证书（PEM 格式）
  // --------------------------------------------------------------------------
  string cert = 3;
  
  // --------------------------------------------------------------------------
  // 字段 4: node_statuses - 节点状态列表
  // --------------------------------------------------------------------------
  // 类型：repeated NodeStatus（数组/列表）
  // 作用：列出该域下所有节点的状态信息
  // repeated 关键字：表示这是一个重复字段（数组/列表）
  // 可以包含 0 个或多个 NodeStatus 对象
  // 
  // 使用示例（Java）：
  // List<NodeStatus> statuses = response.getData().getNodeStatusesList();
  // for (NodeStatus status : statuses) {
  //     log.info("Node: {}, Status: {}", status.getName(), status.getStatus());
  // }
  repeated NodeStatus node_statuses = 4;
  
  // --------------------------------------------------------------------------
  // 字段 5: deploy_token_statuses - 部署令牌状态列表
  // --------------------------------------------------------------------------
  // 类型：repeated DeployTokenStatus（数组/列表）
  // 作用：列出该域的部署令牌及其使用状态
  // 部署令牌用于新节点加入时的身份验证
  repeated DeployTokenStatus deploy_token_statuses = 5;
  
  // --------------------------------------------------------------------------
  // 字段 6: annotations - 注解（键值对映射）
  // --------------------------------------------------------------------------
  // 类型：map<string, string>
  // 作用：存储自定义的元数据（键值对）
  // map 语法：map<key_type, value_type> field_name = field_number;
  // 
  // 使用场景：
  // - 添加自定义标签（如 "environment": "production"）
  // - 存储扩展信息（如 "region": "cn-hangzhou"）
  // - 版本标记（如 "version": "1.0.0"）
  // 
  // 使用示例（Java）：
  // Map<String, String> annotations = response.getData().getAnnotationsMap();
  // String env = annotations.get("environment");
  map<string, string> annotations = 6;
  
  // --------------------------------------------------------------------------
  // 字段 7: auth_center - 认证中心配置
  // --------------------------------------------------------------------------
  AuthCenter auth_center = 7;
  
  // --------------------------------------------------------------------------
  // 字段 8: master_domain_id - 主域 ID
  // --------------------------------------------------------------------------
  // 如果是 partner 节点，这里显示其所属的 master 节点 ID
  // 如果是 master 节点，此字段可能为空
  string master_domain_id = 8;
}

// ============================================================================
// 消息定义：NodeStatus（节点状态）
// ============================================================================
// 描述域中某个节点的运行时状态
message NodeStatus {
  // --------------------------------------------------------------------------
  // 字段 1: name - 节点名称
  // --------------------------------------------------------------------------
  // 节点的唯一标识（在同一域内）
  // 示例："node-001"、"alice-worker-1"
  string name = 1;
  
  // --------------------------------------------------------------------------
  // 字段 2: status - 节点状态
  // --------------------------------------------------------------------------
  // 可选值：
  //   - "Ready"：节点就绪，可以接受任务
  //   - "NotReady"：节点未就绪（可能正在启动或出现故障）
  //   - "Unknown"：状态未知
  //   - "SchedulingDisabled"：禁止调度新任务
  string status = 2;
  
  // --------------------------------------------------------------------------
  // 字段 3: version - 节点版本
  // --------------------------------------------------------------------------
  // 节点软件的版本号
  // 示例："v0.9.0"、"1.2.3"
  string version = 3;
  
  // --------------------------------------------------------------------------
  // 字段 4: last_heartbeat_time - 最后心跳时间
  // --------------------------------------------------------------------------
  // 格式：ISO 8601 时间戳
  // 示例："2024-01-15T10:30:00Z"
  // 作用：判断节点是否存活（如果距离现在超过阈值，认为节点失联）
  string last_heartbeat_time = 4;
  
  // --------------------------------------------------------------------------
  // 字段 5: last_transition_time - 最后状态转换时间
  // --------------------------------------------------------------------------
  // 节点状态最后一次变化的时间
  // 例如：从 "NotReady" 变为 "Ready" 的时间
  string last_transition_time = 5;
}

// ============================================================================
// 消息定义：UpdateDomainRequest（更新域请求）
// ============================================================================
// 与 CreateDomainRequest 类似，但只更新提供的字段
// 未提供的字段保持原值不变
message UpdateDomainRequest {
  // 请求头（携带元数据）
  RequestHeader header = 1;
  
  // 要更新的域 ID（必填）
  string domain_id = 2;
  
  // 新的角色（可选）
  // 如果提供，将更新域的角色
  string role = 3;
  
  // 新的证书（可选）
  // 用于证书轮换（Certificate Rotation）
  string cert = 4;
  
  // 新的认证中心配置（可选）
  AuthCenter auth_center = 5;
  
  // 新的主域 ID（可选）
  string master_domain_id = 6;
}

// ============================================================================
// 消息定义：UpdateDomainResponse（更新域响应）
// ============================================================================
message UpdateDomainResponse {
  // 操作状态（code=0 表示更新成功）
  Status status = 1;
}

// ============================================================================
// 消息定义：BatchQueryDomainRequest（批量查询域请求）
// ============================================================================
message BatchQueryDomainRequest {
  // 请求头（携带元数据）
  RequestHeader header = 1;
  
  // --------------------------------------------------------------------------
  // 字段 2: domain_ids - 域 ID 列表
  // --------------------------------------------------------------------------
  // 类型：repeated string（字符串数组）
  // 作用：指定要查询的多个域 ID
  // 数量限制：建议不超过 100 个，避免请求过大
  // 
  // 使用示例（Java）：
  // BatchQueryDomainRequest request = BatchQueryDomainRequest.newBuilder()
  //     .addDomainIds("alice")
  //     .addDomainIds("bob")
  //     .addDomainIds("tee")
  //     .build();
  repeated string domain_ids = 2;
}

// ============================================================================
// 消息定义：BatchQueryDomainResponse（批量查询域响应）
// ============================================================================
message BatchQueryDomainResponse {
  // 操作状态（code=0 表示查询成功）
  Status status = 1;
  
  // 查询结果数据
  BatchQueryDomainResponseData data = 2;
}

// ============================================================================
// 消息定义：BatchQueryDomainResponseData（批量查询响应数据）
// ============================================================================
message BatchQueryDomainResponseData {
  // --------------------------------------------------------------------------
  // 字段 1: domains - 域列表
  // --------------------------------------------------------------------------
  // 类型：repeated Domain（Domain 对象数组）
  // 作用：包含所有查询到的域信息
  // 注意：如果某个 domain_id 不存在，不会出现在列表中
  // 
  // 使用示例（Java）：
  // List<Domain> domains = response.getData().getDomainsList();
  // for (Domain domain : domains) {
  //     log.info("Domain: {}, Role: {}", domain.getDomainId(), domain.getRole());
  // }
  repeated Domain domains = 1;
}

// ============================================================================
// 消息定义：Domain（域信息摘要）
// ============================================================================
// 用于批量查询时返回的简化域信息
// 相比 QueryDomainResponseData，缺少一些详细字段（如 annotations、deploy_token_statuses）
message Domain {
  // 域 ID
  string domain_id = 1;
  
  // 域角色
  string role = 2;
  
  // 域证书（PEM 格式）
  string cert = 3;
  
  // 节点状态列表
  repeated NodeStatus node_statuses = 4;
}

// ============================================================================
// 消息定义：DeployTokenStatus（部署令牌状态）
// ============================================================================
// 部署令牌用于新节点加入网络时的身份验证
// 每个令牌只能使用一次，使用后状态变为 "used"
message DeployTokenStatus {
  // --------------------------------------------------------------------------
  // 字段 1: token - 部署令牌
  // --------------------------------------------------------------------------
  // 类型：string
  // 作用：一次性使用的令牌，用于新节点注册时的身份验证
  // 格式：通常是随机生成的字符串或 JWT Token
  // 示例："eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
  // deploy token
  string token = 1;
  
  // --------------------------------------------------------------------------
  // 字段 2: state - 令牌状态
  // --------------------------------------------------------------------------
  // 类型：string
  // 可选值：
  //   - "unused"：未使用，可以用于新节点注册
  //   - "used"：已使用，不能再用于注册
  //   - "expired"：已过期（如果令牌有过期时间）
  // used or unused
  string state = 2;
  
  // --------------------------------------------------------------------------
  // 字段 3: last_transition_time - 最后状态转换时间
  // --------------------------------------------------------------------------
  // 格式：ISO 8601 时间戳
  // 作用：记录令牌状态最后变化的时间
  // 示例："2024-01-15T10:30:00Z"
  string last_transition_time = 3;
}

// ============================================================================
// 消息定义：AuthCenter（认证中心配置）
// ============================================================================
// 配置域的认证方式和令牌生成方法
message AuthCenter {
  // --------------------------------------------------------------------------
  // 字段 1: authentication_type - 认证类型
  // --------------------------------------------------------------------------
  // 类型：string
  // 作用：指定使用的认证方式
  // 可选值：
  //   - "Token"：基于令牌的认证
  //   - "mTLS"：双向 TLS 认证
  //   - "OAuth2"：OAuth 2.0 认证
  //   - "LDAP"：LDAP 目录服务认证
  // Token
  string authentication_type = 1;
  
  // --------------------------------------------------------------------------
  // 字段 2: token_gen_method - 令牌生成方法
  // --------------------------------------------------------------------------
  // 类型：string
  // 作用：指定如何生成认证令牌
  // 可选值：
  //   - "UID-RSA-GEN"：使用 UID + RSA 算法生成令牌
  //   - "UUID"：使用 UUID 生成随机令牌
  //   - "JWT"：使用 JWT（JSON Web Token）格式
  //   - "CUSTOM"：自定义生成方法
  // UID-RSA-GEN
  string token_gen_method = 2;
}